# configs/rl_agents.yaml

causal_alpha_agent:
  algorithm: "SAC"           # Soft Actor-Critic for continuous action spaces
  learning_rate: 0.0003
  buffer_size: 1000000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  net_arch:
    - 256
    - 256
  features_extractor: "CausalGraphCNN"

regime_allocator:
  algorithm: "PPO"           # Proximal Policy Optimization
  learning_rate: 0.0001
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  clip_range: 0.2
  ent_coef: 0.01             # Entropy coefficient to encourage exploration

execution_agent:
  algorithm: "TD3"           # Twin Delayed DDPG (good for deterministic execution)
  learning_rate: 0.001
  action_noise: "OrnsteinUhlenbeck"
  max_episode_steps: 500     # Time horizon for order execution